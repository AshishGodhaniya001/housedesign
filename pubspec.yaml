name: test_app
description: RoyalNest floor planner with optional cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  path_provider: ^2.1.2
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/royalnest_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/royalnest_logo.png
  adaptive_icon_background: "#0F1A2A"
  adaptive_icon_foreground: assets/branding/royalnest_logo.png
  web:
    generate: true
    image_path: assets/branding/royalnest_logo.png
    background_color: "#0F1A2A"
    theme_color: "#1D2F4A"
  windows:
    generate: true
    image_path: assets/branding/royalnest_logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/royalnest_logo.png
